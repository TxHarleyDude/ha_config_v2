input_boolean:
  christmas_season_active:
    name: Christmas Season Active
    icon: mdi:pine-tree

  halloween_season_active:
    name: Halloween Season Active
    icon: mdi:halloween

# group:
  # christmas_light_switches:
    # name: Christmas Light Switches
    # icon: mdi:string-lights
    # entities:
      # - switch.kauf_plug_ec6f57_kauf_plug
      
template:
  - sensor:
    - unique_id: christmas_season
      default_entity_id: sensor.christmas_season
      name: Christmas Season
      state: >
        {%- set month, week, day = 11, 4, 3 %} {%- set today = now().date() %}
        {%- set temp = today.replace(month=month, day=1) %} 
        {%- set adjust = (day - temp.weekday()) % 7 %} 
        {%- set temp = temp + timedelta(days=adjust) %} 
        {%- set thanksgiving = temp + timedelta(weeks = week - 1) %} 
        {%- set month, week, day = 1, 1, 5 %} {%- set temp = today.replace(month=month, day=1) %} 
        {%- set adjust = (day - temp.weekday()) % 7 %} 
        {%- set temp = temp + timedelta(days=adjust)%} 
        {%- set firstsat = temp + timedelta(weeks = week - 1) %} 
        {{ today < firstsat or today > thanksgiving }}