input_select:
  living_room_tv:
    name: Living Room TV
    options:
      - "On"
      - "Off"
      - "Paused"
      - "Playing"
      - "Idle"
      - "Starting"

template:
  - binary_sensor:
      - name: 'Living Room Tv On'
        state: >
          {{ not is_state('media_player.living_room_lg_webos_tv', 'off') }}

automation:
  - id: "living_room_tv_state"
    alias: "Living Room TV State Change"
    initial_state: true
    trigger:
      - trigger: state
        entity_id:
          - media_player.living_room_lg_webos_tv
    action:
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ is_state('media_player.living_room_lg_webos_tv', 'paused') }}"
          sequence:
            action: script.living_room_tv_paused
        - conditions:
          - condition: template
            value_template: "{{ is_state('media_player.living_room_lg_webos_tv', 'playing') }}"
          sequence:
            action: script.living_room_tv_playing
        - conditions:
          - condition: template
            value_template: "{{ is_state('media_player.living_room_lg_webos_tv', 'on') }}"
          sequence:
            action: script.living_room_tv_on
        - conditions:
          - condition: template
            value_template: "{{ is_state('media_player.living_room_lg_webos_tv', 'off') }}"
          sequence:
            action: script.living_room_tv_off

# use WOL to turn on TV, check if TV is in Starting mode
script:
  turn_living_room_tv_on:
    alias: Turn Living Room TV On
    sequence:
      - action: button.press
        target:
          entity_id: button.living_room_lg_tv_wake_on_lan
      - action: input_select.select_option
        data:
          entity_id: input_select.living_room_tv
          option: "Starting"

# scripts for the various states the tv has 
  living_room_tv_paused:
    alias: Living Room TV Paused
    sequence:
      - action: input_select.select_option
        data:
          entity_id: input_select.living_room_tv
          option: "Paused"

  living_room_tv_playing:
    alias: Living Room TV Playing
    sequence:
      - action: input_select.select_option
        data:
          entity_id: input_select.living_room_tv
          option: "Playing"

  living_room_tv_on:
    alias: Living Room TV On
    sequence:
      - action: input_select.select_option
        data:
          entity_id: input_select.living_room_tv
          option: "On"

  living_room_tv_off:
    alias: Living Room TV Off
    sequence:
      - action: input_select.select_option
        data:
          entity_id: input_select.living_room_tv
          option: "Off"

  living_room_tv_notification:
    alias: Living Room TV Notification
    sequence:
      - if:
          - condition: state
            entity_id: binary_sensor.living_room_tv_on
            state: "on"
        then:
          - action: notify.lg_webos_tv_75uq7070zud
            metadata: {}
            data:
              message: >-
                {{ message }}
